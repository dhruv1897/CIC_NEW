name: Daily News Refresh

# Runs the PULSE news engine on GitHub's servers — works 24/7 even when your
# laptop and the Claude app are closed.

on:
  schedule:
    # 12:00 UTC daily. Adjust to your morning:
    #   India (IST):      cron '30 0 * * *'  = 6:00 AM
    #   US Eastern (EDT): cron '0 10 * * *'  = 6:00 AM
    #   US Pacific (PDT): cron '0 13 * * *'  = 6:00 AM
    - cron: '0 12 * * *'
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and write today's news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.mjs

      - name: Commit if stories changed
        run: |
          git config user.name "pulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/stories.json
          git diff --staged --quiet || git commit -m "Daily news refresh ($(date -u +%F))"
          git push
